<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Three stumps -->
  <rect x="35" y="30" width="6" height="50" rx="3" fill="url(#goldGrad)" />
  <rect x="47" y="30" width="6" height="50" rx="3" fill="url(#goldGrad)" />
  <rect x="59" y="30" width="6" height="50" rx="3" fill="url(#goldGrad)" />
  <!-- Two bails -->
  <rect x="34" y="25" width="14" height="4" rx="2" fill="url(#goldGrad)" />
  <rect x="52" y="25" width="14" height="4" rx="2" fill="url(#goldGrad)" />
  <!-- Circular glow border -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="10 5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite" />
  </circle>
</svg>